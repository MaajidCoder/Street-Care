<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Portal - Street Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .portal-card { background: white; padding: 3rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); width: 100%; max-width: 500px; text-align: center; }
        .logo { font-size: 2rem; font-weight: 700; color: #2563eb; margin-bottom: 0.5rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; }
        .subtitle { color: #64748b; margin-bottom: 2.5rem; font-size: 1.1rem; }
        
        .role-btn {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #1e293b;
            text-align: left;
        }

        .role-btn:hover {
            border-color: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.05);
        }

        .role-icon {
            width: 50px;
            height: 50px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #64748b;
            transition: all 0.2s;
        }

        .role-btn:hover .role-icon {
            background: #2563eb;
            color: white;
        }

        .role-info h3 { margin: 0 0 0.25rem 0; font-size: 1.1rem; }
        .role-info p { margin: 0; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="portal-card">
        <div class="logo">
            <i class="fas fa-heart"></i> Street Care
        </div>
        <p class="subtitle">Please select your login portal</p>

        <a href="login_citizen.html" class="role-btn">
            <div class="role-icon"><i class="fas fa-user"></i></div>
            <div class="role-info">
                <h3>Citizen</h3>
                <p>Report issues & track progress</p>
            </div>
            <i class="fas fa-arrow-right" style="margin-left: auto; color: #cbd5e1;"></i>
        </a>

        <a href="login_volunteer.html" class="role-btn">
            <div class="role-icon"><i class="fas fa-hands-helping"></i></div>
            <div class="role-info">
                <h3>Volunteer</h3>
                <p>Find tasks & help community</p>
            </div>
            <i class="fas fa-arrow-right" style="margin-left: auto; color: #cbd5e1;"></i>
        </a>

        <a href="login_admin.html" class="role-btn">
            <div class="role-icon"><i class="fas fa-shield-alt"></i></div>
            <div class="role-info">
                <h3>Authority / Admin</h3>
                <p>Manage system & reports</p>
            </div>
            <i class="fas fa-arrow-right" style="margin-left: auto; color: #cbd5e1;"></i>
        </a>

        <div style="margin-top: 2rem;">
            <a href="../index.html" style="color: #94a3b8; text-decoration: none;">&larr; Back to Home</a>
        </div>
    </div>
</body>
</html>
