<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Street Care</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Outfit', sans-serif; display: flex; height: 100vh; overflow: hidden; background: white; }
        
        /* Left Brand Section */
        .brand-section {
            flex: 1;
            background: #0f172a; /* Slate 900 */
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
        }

        .brand-section::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(51,65,85,0.3) 0%, rgba(15,23,42,0) 100%);
            z-index: 1;
        }

        .brand-content { position: relative; z-index: 2; max-width: 500px; }
        .brand-logo { font-size: 2.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 15px; }
        .brand-logo i { color: #f8fafc; }
        .brand-desc { font-size: 1.2rem; line-height: 1.6; color: #94a3b8; margin-bottom: 2rem; }
        
        .feature-list { list-style: none; padding: 0; margin: 0; }
        .feature-item { display: flex; align-items: center; gap: 15px; margin-bottom: 1rem; font-size: 1rem; color: #cbd5e1; }
        .feature-item i { color: #94a3b8; width: 24px; text-align: center; }

        /* Right Form Section */
        .form-section {
            width: 550px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            background: #ffffff;
        }

        .login-card { width: 100%; max-width: 400px; }
        
        .page-title { font-size: 2rem; font-weight: 700; color: #1e293b; margin-bottom: 0.5rem; }
        .page-subtitle { color: #64748b; margin-bottom: 2.5rem; }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; color: #334155; }
        .input-group input { 
            width: 100%; padding: 1rem; border: 1px solid #e2e8f0; border-radius: 10px; 
            font-family: inherit; font-size: 1rem; transition: all 0.2s;
        }
        .input-group input:focus { outline: none; border-color: #0f172a; box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.1); }

        .btn-primary { 
            width: 100%; padding: 1rem; background: #0f172a; color: white; 
            border: none; border-radius: 10px; font-weight: 600; cursor: pointer; 
            font-size: 1rem; transition: all 0.2s; margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }
        .btn-primary:hover { background: #334155; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(15, 23, 42, 0.3); }

        .links { margin-top: 2rem; text-align: center; font-size: 0.95rem; color: #64748b; }
        .links a { color: #0f172a; text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }

        @media (max-width: 900px) {
            .brand-section { display: none; }
            .form-section { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="brand-section">
        <div class="brand-content">
            <div class="brand-logo">
                <i class="fas fa-shield-alt"></i> Street Care
            </div>
            <p class="brand-desc">Secure access for Authorities and Administrators. Manage issues and oversee platform operations.</p>
            <ul class="feature-list">
                <li class="feature-item"><i class="fas fa-lock"></i> Secure encrypted connection</li>
                <li class="feature-item"><i class="fas fa-users-cog"></i> Manage users and reports</li>
                <li class="feature-item"><i class="fas fa-chart-line"></i> View system analytics</li>
            </ul>
        </div>
    </div>

    <div class="form-section">
        <div class="login-card">
            <h1 class="page-title">Admin Login</h1>
            <p class="page-subtitle">Authorized personnel only.</p>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="admin@streetcare.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Enter your password">
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 0.9rem;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: #64748b;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                </div>

                <button type="submit" class="btn-primary">Secure Login</button>
            </form>

            <div class="links">
                Need an account? <a href="register_admin.html">Register as Admin</a><br><br>
                <a href="../index.html" style="color: #94a3b8; font-weight: 400; font-size: 0.85rem;"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const res = await window.CivicConnectAPI.login(email, password);
                
                if (res.success) {
                    if (res.user.role === 'admin') {
                        window.location.href = '../admin/dashboard.html';
                    } else if (res.user.role === 'authority') {
                        window.location.href = '../authority/dashboard.html';
                    } else {
                        alert('Access Denied: You do not have administrative privileges.');
                        window.CivicConnectAPI.logout();
                    }
                } else {
                    alert(res.error || 'Login failed');
                }
            } catch (err) {
                console.error(err);
                alert('An error occurred');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
