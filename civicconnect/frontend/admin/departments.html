<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <style>
        :root { --primary-color: #0f172a; --accent-color: #6366f1; }
        .sidebar { background: #0f172a; border-right: 1px solid #1e293b; color: white; }
        .sidebar .nav-link { color: #94a3b8; }
        .sidebar .nav-link:hover { background-color: rgba(255,255,255,0.05); color: white; }
        .sidebar .nav-link.active { background-color: rgba(99, 102, 241, 0.1); color: #6366f1; border-left: 3px solid #6366f1; }
        .sidebar .logo { color: white; border-bottom: 1px solid #1e293b; }

        .dept-card { background: white; border-radius: 12px; padding: 24px; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .dept-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .stat-row { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.9rem; }
        .stat-label { color: #64748b; }
        .stat-val { font-weight: 600; color: #0f172a; }
        .progress-bg { height: 6px; background: #f1f5f9; border-radius: 3px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: #6366f1; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-heart"></i> Street Care</div>
        <ul class="nav-links">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li class="nav-item"><a href="reports.html" class="nav-link"><i class="fas fa-clipboard-list"></i> Reports</a></li>
            <li class="nav-item"><a href="volunteers.html" class="nav-link"><i class="fas fa-users"></i> Volunteers</a></li>
            <li class="nav-item"><a href="departments.html" class="nav-link active"><i class="fas fa-chart-pie"></i> Analytics</a></li>
            <li class="nav-item"><a href="settings.html" class="nav-link"><i class="fas fa-cogs"></i> Settings</a></li>
        </ul>
        <div class="user-profile">
            <div class="avatar" style="background:#0f172a;">A</div>
            <div style="flex: 1;"><div style="font-weight: 600;">System Admin</div></div>
            <button onclick="window.CivicConnectAPI.logout()" style="background: none; border: none; cursor: pointer; color: #94a3b8;" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
             <div>
                <h1 style="font-size: 1.75rem; font-weight: 700; color: #0f172a; margin: 0;">Service Analytics</h1>
                <p style="color: #64748b; margin: 5px 0 0 0;">Real-time performance metrics by department.</p>
            </div>
            <button onclick="loadAnalytics()" class="btn-primary" style="background: white; color: #0f172a; border: 1px solid #cbd5e1;"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>

        <!-- Analytics Grid -->
        <div id="analytics-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem;">
            <!-- Instant Loading Skeleton -->
            <div class="dept-card" style="opacity: 0.7;">
                <h3><i class="fas fa-circle-notch fa-spin"></i> Analyzing Data...</h3>
                <p>Please wait while we calculate statistics.</p>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="details-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; width: 90%; max-width: 600px; border-radius: 16px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); animation: zoomIn 0.2s ease-out; max-height: 80vh; display: flex; flex-direction: column;">
            <div style="padding: 1.5rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8fafc;">
                <h2 style="margin: 0; font-size: 1.25rem; color: #0f172a;" id="modal-title">Department Details</h2>
                <button onclick="document.getElementById('details-modal').style.display='none'" style="background: none; border: none; font-size: 1.5rem; color: #64748b; cursor: pointer;">&times;</button>
            </div>
            <div id="modal-content" style="padding: 0; overflow-y: auto;">
                <!-- Dynamic Content -->
            </div>
            <div style="padding: 1rem; border-top: 1px solid #e2e8f0; text-align: right; background: #f8fafc;">
                <button onclick="document.getElementById('details-modal').style.display='none'" class="btn-primary" style="background: white; color: #334155; border: 1px solid #cbd5e1;">Close</button>
            </div>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="../js/api.js?v=2"></script>
    <script>
        const DEPARTMENTS = {
            'Sanitation': { 
                icon: 'fa-trash', color: '#10b981', 
                categories: ['garbage', 'waste', 'animal', 'cleaning'] 
            },
            'Infrastructure': { 
                icon: 'fa-road', color: '#3b82f6', 
                categories: ['road', 'pothole', 'street', 'light', 'bridge', 'water'] 
            },
            'Public Safety': { 
                icon: 'fa-shield-alt', color: '#ef4444', 
                categories: ['safety', 'noise', 'protest', 'fire'] 
            },
            'Parks & Recreation': { 
                icon: 'fa-tree', color: '#f59e0b', 
                categories: ['park', 'tree', 'garden'] 
            }
        };

        // Toast Helpers
        function showToast(msg) {
            const t = document.createElement('div');
            t.style.cssText = "background:#0f172a;color:white;padding:12px 24px;border-radius:8px;margin-top:10px;animation:slideIn 0.3s forwards";
            t.textContent = msg;
            document.getElementById('toast-container').appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        document.head.insertAdjacentHTML("beforeend", `<style>
            @keyframes slideIn {from{transform:translateX(100%)}to{transform:translateX(0)}} 
            @keyframes zoomIn {from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
        </style>`)
        
        let ALL_ISSUES = [];

        async function loadAnalytics() {
            const grid = document.getElementById('analytics-grid');
            
            try {
                // Fetch ALL issues directly (Bypassing broken departments.php)
                const response = await window.CivicConnectAPI.request('issues.php?action=list');
                
                if (!response.success) throw new Error(response.error || 'Failed to fetch data');
                
                ALL_ISSUES = response.data || [];
                const issues = ALL_ISSUES;
                grid.innerHTML = ''; // Clear skeleton

                // Process Data Logic
                const stats = {};
                Object.keys(DEPARTMENTS).forEach(d => stats[d] = { total: 0, resolved: 0 });
                stats['Other'] = { total: 0, resolved: 0 };

                issues.forEach(issue => {
                    let matched = false;
                    const cat = (issue.category || '').toLowerCase();
                    const title = (issue.title || '').toLowerCase();

                    // Match issue to department
                    for (const [deptName, config] of Object.entries(DEPARTMENTS)) {
                        if (config.categories.some(k => cat.includes(k) || title.includes(k))) {
                            stats[deptName].total++;
                            if (['resolved', 'closed'].includes(issue.status)) stats[deptName].resolved++;
                            matched = true;
                            break;
                        }
                    }
                    if (!matched) {
                        stats['Other'].total++;
                        if (['resolved', 'closed'].includes(issue.status)) stats['Other'].resolved++;
                    }
                });

                // Render Cards
                Object.entries(stats).forEach(([dept, data]) => {
                    if (data.total === 0 && dept === 'Other') return;

                    const config = DEPARTMENTS[dept] || { icon: 'fa-folder', color: '#64748b' };
                    const rate = data.total > 0 ? Math.round((data.resolved / data.total) * 100) : 0;
                    
                    const html = `
                        <div class="dept-card">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <h3 style="margin:0; font-size:1.25rem;"><i class="fas ${config.icon}" style="color:${config.color}; margin-right:8px;"></i>${dept}</h3>
                                <div style="background:${config.color}20; color:${config.color}; padding:4px 12px; border-radius:20px; font-weight:600; font-size:0.8rem;">
                                    ${rate}% Resolved
                                </div>
                            </div>
                            
                            <div style="margin-top:20px;">
                                <div class="stat-row">
                                    <span class="stat-label">Total Reports</span>
                                    <span class="stat-val">${data.total}</span>
                                </div>
                                <div class="stat-row">
                                    <span class="stat-label">Pending Issues</span>
                                    <span class="stat-val" style="color:#ef4444">${data.total - data.resolved}</span>
                                </div>
                            </div>

                            <div class="progress-bg">
                                <div class="progress-fill" style="width:${rate}%; background:${config.color}"></div>
                            </div>
                            
                            <button onclick="openDetails('${dept}')" style="width:100%; margin-top:16px; padding:8px; background:white; border:1px solid #e2e8f0; border-radius:6px; color:#475569; font-weight:500; cursor:pointer; transition:all 0.2s;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
                                View Recent Activity
                            </button>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', html);
                });

            } catch (e) {
                console.error(e);
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#ef4444; padding:2rem;">
                    <i class="fas fa-exclamation-triangle"></i> Error loading analytics: ${e.message}
                </div>`;
            }
        }

        function openDetails(deptName) {
            const modal = document.getElementById('details-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').textContent = deptName + " Activity";
            
            content.innerHTML = '';
            
            // Filter issues for this department
            const config = DEPARTMENTS[deptName] || { categories: [] };
            const deptIssues = ALL_ISSUES.filter(issue => {
                const cat = (issue.category || '').toLowerCase();
                const title = (issue.title || '').toLowerCase();
                if (deptName === 'Other') {
                    // Primitive check for 'Other', better logic would be to see if it matches NO other dept
                    const validCats = Object.values(DEPARTMENTS).flatMap(d => d.categories);
                    return !validCats.some(k => cat.includes(k) || title.includes(k));
                }
                return config.categories.some(k => cat.includes(k) || title.includes(k));
            });

            if (deptIssues.length === 0) {
                content.innerHTML = '<div style="padding:2rem; text-align:center; color:#94a3b8;">No recent activity found.</div>';
            } else {
                deptIssues.sort((a,b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 10).forEach(issue => {
                     const isResolved = ['resolved', 'closed'].includes(issue.status);
                     const item = document.createElement('div');
                     item.style.cssText = "padding:1rem; border-bottom:1px solid #f1f5f9; display:flex; gap:12px; align-items:center;";
                     item.innerHTML = `
                        <div style="width:36px; height:36px; border-radius:50%; background:${isResolved ? '#ecfdf5' : '#eff6ff'}; color:${isResolved ? '#10b981' : '#3b82f6'}; display:flex; align-items:center; justify-content:center;">
                            <i class="fas ${isResolved ? 'fa-check' : 'fa-clock'}"></i>
                        </div>
                        <div style="flex:1;">
                            <div style="font-weight:600; color:#0f172a; font-size:0.9rem;">${issue.title}</div>
                            <div style="color:#64748b; font-size:0.8rem;">
                                <i class="far fa-calendar"></i> ${new Date(issue.created_at).toLocaleDateString()}
                                <span style="margin-left:8px; padding:2px 6px; background:#f1f5f9; border-radius:4px; font-size:0.75rem;">${issue.status}</span>
                            </div>
                        </div>
                     `;
                     content.appendChild(item);
                });
            }

            modal.style.display = 'flex';
        }

        document.addEventListener('DOMContentLoaded', loadAnalytics);
    </script>
</body>
</html>
