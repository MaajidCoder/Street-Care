<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Street Care</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <style>
        .profile-card { background: white; border-radius: 16px; max-width: 600px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; }
        
        .profile-header {
            height: 140px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            position: relative;
        }
        
        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            border: 4px solid white;
            position: absolute;
            bottom: -50px;
            left: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #2563eb;
        }

        .profile-body { padding: 4rem 2rem 2rem 2rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: #1e293b; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; }
        
        .btn-primary { 
            width: 100%; padding: 0.75rem; background: #2563eb; color: white; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; 
        }
        .btn-primary:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><i class="fas fa-heart"></i> Street Care</div>
        <ul class="nav-links">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li class="nav-item">
                <a href="my_reports.html" class="nav-link">
                    <i class="fas fa-file-alt"></i>
                    My Reports
                </a>
            </li>
             <li class="nav-item">
                <a href="analytics.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    Analytics
                </a>
            </li>
            <li class="nav-item"><a href="achievements.html" class="nav-link"><i class="fas fa-medal"></i> Achievements</a></li>
            <li class="nav-item"><a href="profile.html" class="nav-link active"><i class="fas fa-user-cog"></i> Profile</a></li>
        </ul>
        <div class="user-profile">
            <div class="avatar" id="user-avatar">?</div>
            <div style="flex: 1; overflow: hidden;">
                <div style="font-weight: 600; font-size: 0.95rem;" id="user-name">Loading...</div>
                <div style="font-size: 0.75rem; color: #94a3b8;">Citizen Account</div>
            </div>
             <button onclick="window.CivicConnectAPI.logout()" style="background: none; border: none; cursor: pointer; color: #94a3b8;" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Profile Settings</h1>
                <p>Manage your account information.</p>
            </div>
        </div>

        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large" id="profile-avatar-large">?</div>
            </div>
            <div class="profile-body">
                <h2 style="margin: 0 0 5px 0; color: #1e293b; font-size: 1.5rem;" id="profile-name-display">Loading...</h2>
                <p style="margin: 0 0 2rem 0; color: #64748b;" id="profile-email-display">user@example.com</p>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full_name_input" value="Loading...">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email_input" value="Loading...">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone_input" placeholder="+1 234 567 8900">
                </div>
                <div class="form-group">
                    <label>Location (City/Area)</label>
                    <input type="text" id="location_input" placeholder="e.g. New York, NY">
                </div>
                <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
            </div>
        </div>
    </div>
    
    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="../js/api.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user_data') || '{}');
        if (!user.id) {
            // window.location.href = '../auth/login.html';
        }



        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background: #0f172a; color: white; padding: 1rem 2rem; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease-out; font-weight: 500;`;
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove() }, 3000);
        }
        
        const style = document.createElement('style');
        style.innerHTML = `@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }`;
        document.head.appendChild(style);

        async function loadProfile() {
            // Initial render from local storage
            if(user.full_name) {
                const initials = user.full_name.match(/(\b\S)?/g).join("").match(/(^\S|\S$)?/g).join("").toUpperCase();
                
                // Sidebar
                document.getElementById('user-name').textContent = user.full_name;
                document.getElementById('user-avatar').textContent = initials;
                
                // Main Profile Card
                document.getElementById('profile-name-display').textContent = user.full_name;
                document.getElementById('profile-email-display').textContent = user.email;
                document.getElementById('profile-avatar-large').textContent = initials;
                
                // Form Inputs
                document.getElementById('full_name_input').value = user.full_name;
                document.getElementById('email_input').value = user.email;
                document.getElementById('phone_input').value = user.phone || '';
                document.getElementById('location_input').value = user.location || '';
            }

            try {
                // Fetch fresh data
                const res = await window.CivicConnectAPI.request(`users.php?action=get&id=${user.id}`);
                if (res.success) {
                     const u = res.data;
                     const initials = u.full_name.match(/(\b\S)?/g).join("").match(/(^\S|\S$)?/g).join("").toUpperCase();
                     
                     document.getElementById('full_name_input').value = u.full_name;
                     document.getElementById('email_input').value = u.email;
                     document.getElementById('phone_input').value = u.phone || '';
                     document.getElementById('location_input').value = u.location || '';
                     
                     // Update display texts in case they changed
                     document.getElementById('profile-name-display').textContent = u.full_name;
                     document.getElementById('profile-email-display').textContent = u.email;
                     document.getElementById('profile-avatar-large').textContent = initials;
                }
            } catch (e) {
                console.error("Error loading profile", e);
            }
        }

        async function saveProfile() {
            const fullName = document.getElementById('full_name_input').value;
            const email = document.getElementById('email_input').value;
            const phone = document.getElementById('phone_input').value;
            const location = document.getElementById('location_input').value;

            try {
                const res = await window.CivicConnectAPI.request('users.php', 'POST', {
                    action: 'update_profile',
                    user_id: user.id,
                    full_name: fullName,
                    email: email,
                    phone: phone,
                    address: '', // Legacy field
                    location: location
                });

                if (res.success) {
                    showToast('Profile Updated Successfully');
                    // Update local storage
                    const newUser = { ...user, ...res.user };
                    localStorage.setItem('user_data', JSON.stringify(newUser));
                    
                    // Update UI immediately
                    const initials = newUser.full_name.match(/(\b\S)?/g).join("").match(/(^\S|\S$)?/g).join("").toUpperCase();
                    
                    document.getElementById('user-name').textContent = newUser.full_name;
                    document.getElementById('user-avatar').textContent = initials;
                    document.getElementById('profile-name-display').textContent = newUser.full_name;
                    document.getElementById('profile-email-display').textContent = newUser.email;
                    document.getElementById('profile-avatar-large').textContent = initials;
                    
                } else {
                    showToast('Failed to update: ' + res.error);
                }
            } catch (e) {
                console.error(e);
                showToast('Error saving profile');
            }
        }

        loadProfile();
    </script>
</body>
</html>
