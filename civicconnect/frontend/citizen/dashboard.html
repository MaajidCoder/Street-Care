<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard - Street Care</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-heart"></i>
            Street Care
        </div>
        
        <ul class="nav-links">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link active">
                    <i class="fas fa-th-large"></i>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="my_reports.html" class="nav-link">
                    <i class="fas fa-file-alt"></i>
                    My Reports
                </a>
            </li>
            <li class="nav-item">
                <a href="analytics.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    Analytics
                </a>
            </li>
            <li class="nav-item">
                <a href="achievements.html" class="nav-link">
                    <i class="fas fa-medal"></i>
                    Achievements
                </a>
            </li>
            <li class="nav-item">
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user-cog"></i>
                    Profile
                </a>
            </li>
        </ul>

        <div class="user-profile">
            <div class="avatar" id="user-avatar">?</div>
            <div style="flex: 1; overflow: hidden;">
                <div style="font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="user-name">Loading...</div>
                <div style="font-size: 0.75rem; color: #94a3b8;">Citizen Account</div>
            </div>
            <button onclick="window.CivicConnectAPI.logout()" style="background: none; border: none; cursor: pointer; color: #94a3b8; padding: 5px;" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>Dashboard</h1>
                <p>Welcome back! Here's what's happening in your area.</p>
            </div>
            <a href="report.html" class="btn-primary">
                <i class="fas fa-plus"></i> Report Issue
            </a>
        </div>

        <!-- Premium Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon icon-blue">
                        <i class="fas fa-clipboard-list"></i>
                    </div>
                </div>
                <div class="stat-label">Total Reports</div>
                <div class="stat-value" id="total-reports">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon icon-purple">
                        <i class="fas fa-spinner"></i>
                    </div>
                </div>
                <div class="stat-label">In Progress</div>
                <div class="stat-value" id="progress-reports">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon icon-green">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
                <div class="stat-label">Resolved Issues</div>
                <div class="stat-value" id="resolved-reports">0</div>
            </div>
        </div>

        <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem;">Recent Activity</h3>
        
        <div id="issues-list" class="issues-grid">
            <!-- Loading State -->
            <div style="grid-column: 1/-1; padding: 4rem; text-align: center; color: var(--text-light);">
                <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                <p style="margin-top: 1rem;">Loading your impact...</p>
            </div>
        </div>
    </div>

    <div id="toast-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;"></div>

    <script src="../js/api.js"></script>
    <script>
        // Check Auth
        const user = JSON.parse(localStorage.getItem('user_data') || '{}');
        if (!user.id) {
            // window.location.href = '../auth/login.html'; // Uncomment for prod
        }

        // Set User Info
        if(user.full_name) {
            document.getElementById('user-name').textContent = user.full_name;
            document.getElementById('user-avatar').textContent = user.full_name.charAt(0).toUpperCase();
        }

        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background: #0f172a; color: white; padding: 1rem 2rem; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease-out; font-weight: 500;`;
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => { toast.remove() }, 3000);
        }



        async function loadDashboard() {
            try {
                // Pass user_id to filter at API level
                const res = await window.CivicConnectAPI.request(`issues.php?action=list&user_id=${user.id}`);
                const container = document.getElementById('issues-list');
                
                if (res.success && res.data.length > 0) {
                    const myIssues = res.data;
                    
                    // Update Stats
                    document.getElementById('total-reports').textContent = myIssues.length;
                    document.getElementById('progress-reports').textContent = myIssues.filter(i => i.status === 'in_progress' || i.status === 'assigned').length;
                    document.getElementById('resolved-reports').textContent = myIssues.filter(i => i.status === 'resolved').length;

                    container.innerHTML = myIssues.map(issue => {
                        let statusClass = 'status-pending';
                        let statusText = 'Pending';
                        if(issue.status === 'assigned') { statusClass = 'status-assigned'; statusText = 'Assigned'; }
                        else if(issue.status === 'in_progress') { statusClass = 'status-in_progress'; statusText = 'In Progress'; }
                        else if(issue.status === 'resolved') { statusClass = 'status-resolved'; statusText = 'Resolved'; }
                        
                        // Delete only allowed if status is pending
                        const deleteBtn = issue.status === 'pending' ? 
                            `<button onclick="deleteIssue(${issue.id})" style="color: #ef4444; background:none; border:none; cursor:pointer;" title="Delete Report"><i class="fas fa-trash"></i></button>` : '';

                        return `
                        <div class="issue-card">
                            <div class="issue-header">
                                <span class="status-badge ${statusClass}">${statusText}</span>
                                <small style="color: #64748b;">${new Date(issue.created_at).toLocaleDateString()}</small>
                            </div>
                            <div class="issue-body">
                                <h4 class="issue-title">${issue.title}</h4>
                                <p class="issue-desc">${issue.description}</p>
                            </div>
                            <div class="issue-footer" style="display:flex; justify-content:space-between; align-items:center;">
                                <small style="color: #94a3b8;"><i class="fas fa-map-marker-alt"></i> ${issue.area}</small>
                                ${deleteBtn}
                            </div>
                        </div>
                    `}).join('');
                } else {
                    showEmptyState(container);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('issues-list').innerHTML = '<p>Error loading content</p>';
            }
        }

        async function deleteIssue(id) {
            if(!confirm("Are you sure you want to delete this report?")) return;
            try {
                const res = await window.CivicConnectAPI.request(`issues.php?action=delete&id=${id}`, 'POST');
                if(res.success) {
                    showToast('Report deleted successfully');
                    loadDashboard();
                } else {
                    showToast('Failed to delete: ' + (res.error || 'Unknown error'));
                }
            } catch(e) {
                console.error(e);
                showToast('Error deleting report');
            }
        }

        function showEmptyState(container) {
            container.innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <div class="empty-icon">
                        <i class="fas fa-clipboard-check"></i>
                    </div>
                    <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">No Issues Reported Yet</h3>
                    <p style="color: #64748b; max-width: 400px; margin: 0 auto 2rem auto;">
                        You haven't reported any civic issues yet. Be the first to improve your community today!
                    </p>
                    <a href="report.html" class="btn-primary" style="display: inline-flex;">
                        <i class="fas fa-plus"></i> Report Your First Issue
                    </a>
                </div>
            `;
            // Reset stats
            document.getElementById('total-reports').textContent = '0';
            document.getElementById('progress-reports').textContent = '0';
            document.getElementById('resolved-reports').textContent = '0';
        }

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
            .status-in_progress { background: #e0f2fe; color: #0284c7; } /* Blueish for in progress */
        `;
        document.head.appendChild(style);

        loadDashboard();
    </script>
</body>
</html>
