<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports - Street Care</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-heart"></i>
            Street Care
        </div>
        
        <ul class="nav-links">
            <li class="nav-item">
                <a href="dashboard.html" class="nav-link">
                    <i class="fas fa-th-large"></i>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="my_reports.html" class="nav-link active">
                    <i class="fas fa-file-alt"></i>
                    My Reports
                </a>
            </li>
            <li class="nav-item">
                <a href="analytics.html" class="nav-link">
                    <i class="fas fa-chart-bar"></i>
                    Analytics
                </a>
            </li>
            <li class="nav-item">
                <a href="achievements.html" class="nav-link">
                    <i class="fas fa-medal"></i>
                    Achievements
                </a>
            </li>
            <li class="nav-item">
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user-cog"></i>
                    Profile
                </a>
            </li>
        </ul>

        <div class="user-profile">
            <div class="avatar" id="user-avatar">?</div>
            <div style="flex: 1; overflow: hidden;">
                <div style="font-weight: 600; font-size: 0.95rem;" id="user-name">Loading...</div>
                <div style="font-size: 0.75rem; color: #94a3b8;">Citizen Account</div>
            </div>
            <button onclick="window.CivicConnectAPI.logout()" style="background: none; border: none; cursor: pointer; color: #94a3b8;" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1>My Reports</h1>
                <p>Track the status of issues you have submitted.</p>
            </div>
            <a href="report.html" class="btn-primary">
                <i class="fas fa-plus"></i> New Report
            </a>
        </div>

        <div class="issues-grid" id="reports-list">
            <!-- Loading -->
            <p>Loading reports...</p>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user_data') || '{}');
        if(user.full_name) {
            document.getElementById('user-name').textContent = user.full_name;
            document.getElementById('user-avatar').textContent = user.full_name.charAt(0).toUpperCase();
        }

        async function loadReports() {
            try {
                // Fetch reports for this specific user
                const res = await window.CivicConnectAPI.request(`issues.php?action=list&user_id=${user.id}`);
                const container = document.getElementById('reports-list');
                
                if (res.success && Array.isArray(res.data) && res.data.length > 0) {
                    
                    container.innerHTML = res.data.map(issue => `
                        <div class="issue-card">
                            <div class="issue-header">
                                <span class="status-badge status-${issue.status}">${issue.status.replace('_', ' ')}</span>
                                <small>${issue.category || 'General'}</small>
                            </div>
                            <div class="issue-body">
                                <h4 class="issue-title">${issue.title}</h4>
                                <p class="issue-desc">${issue.description}</p>
                                <small style="display:block; margin-top:0.5rem; color:#64748b;">Reported on: ${new Date(issue.created_at).toLocaleDateString()}</small>
                            </div>
                            <div class="issue-footer" style="display: flex; justify-content: space-between; align-items: center;">
                                <small><i class="fas fa-map-marker-alt"></i> ${issue.area || issue.location_address}</small>
                                ${issue.status === 'pending' ? `<button onclick="deleteReport(${issue.id})" style="color: #ef4444; background:none; border:none; cursor:pointer;" title="Delete Report"><i class="fas fa-trash"></i></button>` : ''}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div style="text-align: center; padding: 2rem; color: #64748b;">
                            <i class="fas fa-folder-open" style="font-size: 3rem; margin-bottom: 1rem; color: #cbd5e1;"></i>
                            <p>You haven't submitted any reports yet.</p>
                            <a href="report.html" class="btn-primary" style="margin-top: 1rem; display: inline-block;">Submit First Report</a>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('reports-list').innerHTML = '<p>Error loading reports.</p>';
            }
        }

        async function deleteReport(id) {
            if(!confirm('Are you sure you want to delete this report?')) return;
            try {
                const res = await window.CivicConnectAPI.request(`issues.php?action=delete&id=${id}`, 'POST');
                if(res.success) {
                    loadReports(); // Refresh list
                } else {
                    alert('Failed to delete');
                }
            } catch(e) { console.error(e); }
        }

        loadReports();
    </script>
</body>
</html>
